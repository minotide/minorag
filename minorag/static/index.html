<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minorag</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header>
        <h1>minorag <span>busca inteligente para código</span></h1>
        <button id="btn-index" onclick="indexCode()">Indexar codebase</button>
    </header>

    <div id="chat">
        <div class="empty-state">
            Indexe o código e faça perguntas sobre o projeto.<br>
            Exemplos: "Quais endpoints existem?", "Explique a arquitetura geral"
        </div>
    </div>

    <div id="input-area">
        <textarea id="question" placeholder="Faça uma pergunta sobre o código..." rows="1"
            onkeydown="handleKey(event)"></textarea>
        <button id="btn-send" onclick="sendQuestion()">Enviar</button>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const input = document.getElementById("question");
        const btnSend = document.getElementById("btn-send");
        const btnIndex = document.getElementById("btn-index");
        let hasMessages = false;

        function addMsg(text, cls) {
            if (!hasMessages) {
                chat.innerHTML = "";
                hasMessages = true;
            }
            const div = document.createElement("div");
            div.className = "msg " + cls;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }



        function handleKey(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendQuestion();
            }
        }

        async function indexCode() {
            btnIndex.disabled = true;
            btnIndex.textContent = "Indexando...";
            const msg = addMsg("Indexando código... isso pode levar alguns minutos.", "system");

            try {
                const res = await fetch("/api/index", { method: "POST" });
                const data = await res.json();

                if (res.ok) {
                    addMsg(data.message, "system");
                } else {
                    addMsg(data.error || "Erro na indexação", "system error");
                }
            } catch (err) {
                addMsg("Erro de conexão: " + err.message, "system error");
            }

            btnIndex.disabled = false;
            btnIndex.textContent = "Indexar codebase";
        }

        async function sendQuestion() {
            const question = input.value.trim();
            if (!question) return;

            input.value = "";
            btnSend.disabled = true;

            addMsg(question, "user");
            const thinking = addMsg("Pensando...", "bot typing");

            try {
                const response = await fetch("/api/query/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let answerEl = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const data = JSON.parse(line.slice(6));
                        if (data.type === "log") {
                            thinking.textContent = data.text;
                        } else if (data.type === "token") {
                            if (!answerEl) {
                                thinking.remove();
                                answerEl = addMsg("", "bot");
                            }
                            answerEl.textContent += data.text;
                            chat.scrollTop = chat.scrollHeight;
                        } else if (data.type === "error") {
                            thinking.remove();
                            addMsg(data.text, "bot error");
                        }
                    }
                }
            } catch (err) {
                thinking.remove();
                addMsg("Erro de conexão: " + err.message, "bot error");
            }

            btnSend.disabled = false;
            input.focus();
        }

        // Auto-resize textarea
        input.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });
    </script>
</body>

</html>
